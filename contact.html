<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact K Shrinidhi Bhagavath — Senior Software Engineer open to opportunities in Bangalore.">
    <title>K Shrinidhi Bhagavath | Contact</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js" defer></script>
</head>
<body>
    <div id="grid-trail"></div>
    <div class="bg-animation"></div>
    <div class="floating-shape shape-1">{}</div>
    <div class="floating-shape shape-2">&lt;/&gt;</div>
    <div class="floating-shape shape-3">#</div>

    <nav>
        <a href="index.html">Intro</a>
        <a href="experience.html">Experience</a>
        <a href="projects.html">Projects</a>
        <a href="git_projects.html">Git Projects</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <div class="container">
        <section id="contact" class="page-section fade-up">
            <h2 class="section-title centered">Get In Touch</h2>
            <p class="contact-intro">Have a question or want to work together? Drop me a message.</p>

            <form
                class="contact-form"
                action="https://formspree.io/f/mbjbolnz"
                method="post"
            >
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
                <div class="form-message" role="alert"></div>
            </form>
        </section>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/kashribha/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="https://github.com/kaybee1928" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="mailto:shrinidhibhagavath11@gmail.com">Email</a>
        </div>
        <p>Built by K Shrinidhi Bhagavath &mdash; Solarized Light Theme</p>
    </footer>
</body>
</html>
